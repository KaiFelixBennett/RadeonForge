<!doctype html><html lang="en"><head><meta charset="utf-8"><title>frame</title>
<style>
:root{--bg:#04060c;--win:#070c16;--line:rgba(150,175,210,.20);--line2:rgba(150,175,210,.10);--mut:#8da3c2;--green:#37d39b}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(120% 100% at 50% -20%,rgba(54,212,232,.06),transparent 60%),#04060c;
  display:inline-block;padding:38px;font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
.win{width:1100px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--win);
  box-shadow:0 30px 70px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.04) inset}
.bar{height:46px;display:flex;align-items:center;gap:14px;padding:0 16px;
  background:linear-gradient(180deg,#111a2b,#0c121e);border-bottom:1px solid var(--line2)}
.dots{display:flex;gap:9px}
.dot{width:12px;height:12px;border-radius:50%;opacity:.92}
.url{flex:1;display:flex;align-items:center;gap:9px;height:30px;border:1px solid var(--line2);border-radius:9px;
  background:rgba(255,255,255,.035);padding:0 13px;font-size:13.5px;color:#cdd9ee;max-width:560px;margin:0 auto}
.url svg{width:13px;height:13px;flex:none}
.url .p{color:var(--mut)}.url .p b{color:#eaf2ff;font-weight:600}
.tools{display:flex;gap:16px;color:var(--mut);opacity:.55}
.tools svg{width:17px;height:17px}
.shot{display:block;width:100%}
</style></head><body>
<div class="win">
  <div class="bar">
    <div class="dots"><span class="dot" style="background:#ff5f56"></span><span class="dot" style="background:#febc2e"></span><span class="dot" style="background:#28c840"></span></div>
    <div class="url">
      <svg viewBox="0 0 24 24" fill="none" stroke="#37d39b" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      <span class="p"><b>127.0.0.1:8765</b>/gl</span>
    </div>
    <div class="tools">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v5h-5"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
    </div>
  </div>
  <img class="shot" id="shot" alt="dashboard">
</div>
<script>
const img=new URLSearchParams(location.search).get('img');
const el=document.getElementById('shot');
el.onload=()=>document.body.dataset.ready='1';
el.onerror=()=>document.body.dataset.ready='err';
el.src=img;
</script>
</body></html>
